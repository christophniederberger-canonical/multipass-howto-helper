name: lighthouse_agent
description: "Project Lighthouse local bridge agent for Canonical tutorials."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.5.1
  system_tray: ^2.0.3
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  path: ^1.9.1
  uuid: ^3.0.6
  web_socket_channel: ^3.0.3
  path_provider: ^2.1.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon_normal.png
    - assets/icon_error.png
